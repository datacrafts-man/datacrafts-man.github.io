name: Daily Topic Recommendation

on:
  schedule:
    # 00:05 KST (15:05 UTC)
    - cron: "5 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-topic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Update daily topic
        run: python3 scripts/daily_topic.py update

      - name: Commit daily topic
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add topics/daily.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update daily topic recommendation for $(date -u +%F)"
            git push
          fi
